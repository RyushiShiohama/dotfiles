#utf setting
set-window-option -g mode-keys vi
set-window-option -g automatic-rename off

set -s escape-time 0


# clip board
# set-option -g default-command "reattach-to-user-namespace -l zsh"

# 256色ターミナル
set -g default-terminal "screen-256color"
set -g status-left-length 15

# ステータスラインカスタム関連
set -g status-style bg=black,fg=white,dim

# 左部:whoami@hostname
#set -g status-left '#[fg=green,bold][#20(whoami) No.#I-#P]#[default]'
set -g status-left-length 50
set -g status-left "#{?client_prefix,#[reverse],}#[fg=green][#S:#I.#P]#[fg=yellow][#(whoami)@#h]  "
set-option -g status-left-length 50
set-option -g status-left "#{?client_prefix,#[reverse],}#[fg=green][#S:#I.#P]#[fg=yellow][#(whoami)@#h]  "
#set -g status-left-length 20
# 右部:[2011/03/06(Sun)20:21]
set -g status-right-length 80
set -g status-right \
"#[fg=green]#(~/.tmux-git-echo-branch-current-pane)"\
"#[fg=cyan][%Y-%m-%d(%a) %H:%M]"
set -g message-style bold,fg=red,bg=white

set -g pane-border-style fg=white,bg=black
set -g pane-active-border-style fg=yellow,bg=black

set-window-option -g mode-style bg=white,fg=black
set-window-option -g window-status-style bg=black,fg=white
set-window-option -g window-status-current-style underscore,bg=white,fg=black,bold

# KeyBindings

# Set the prefix to ^T.
unbind C-b
set -g prefix ^T
bind t send-prefix

unbind r
bind r source-file ~/.tmux.conf

# Bind appropriate commands similar to screen.
# lockscreen ^X x
# unbind ^X
# bind ^X lock-server
# unbind x
# bind x lock-server

# screen ^C c
unbind ^C
bind ^C new-window -n zsh
bind c new-window -n zsh

# detach ^D d
unbind ^D
bind ^D detach

# displays *
unbind *
bind * list-clients

# to last window t
unbind C-t
bind C-t last-window

# prev ^H ^P p ^?
unbind ^P
bind ^P previous-window

# next ^@ ^N sp n
unbind ^@
bind ^@ next-window
unbind ^N
bind ^N next-window
unbind " "
bind " " next-window
unbind n
bind n next-window

# title A
unbind A
bind A command-prompt "rename-window %%"

# copy-mode y
setw -g mode-keys vi

unbind y
bind y copy-mode

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# other ^A
unbind ^A
bind ^A last-window

# windows ^W w
unbind ^W
bind ^W list-windows
unbind w
bind w list-windows

# quit \
unbind \
bind \ confirm-before "kill-server"

# kill K k
unbind K
bind K confirm-before "kill-window"
unbind k
bind k confirm-before "kill-window"

# redisplay r
unbind ^R
bind ^R refresh-client

# resize
bind < resize-pane -L 200
bind > resize-pane -R 200
bind - resize-pane -D 100
bind + resize-pane -U 100
bind -r h resize-pane -L 8
bind -r l resize-pane -R 8
bind -r j resize-pane -D 2
bind -r k resize-pane -U 2
bind -r s swap-pane -U

# split -v |
unbind ^S
bind ^S  split-window -v -c "#{pane_current_path}"

# split -h |
unbind ^V
bind ^V  split-window -h -c "#{pane_current_path}"

# :kB: focus up
unbind ^J
bind ^J select-pane -D
unbind ^K
bind ^K select-pane -U
unbind ^H
bind ^H select-pane -L
unbind ^L
bind ^L select-pane -R
